<div class="alert-update-drawer" *ngIf="open()" data-og7="alert-update-drawer">
  <button class="alert-update-drawer__backdrop" type="button" (click)="onBackdropClick()" aria-hidden="true"></button>

  <section class="alert-update-drawer__panel" role="dialog" [attr.aria-modal]="true">
    <header>
      <h2>{{ 'feed.alert.detail.report.title' | translate }}</h2>
      <small *ngIf="alertTitle()">{{ alertTitle() }}</small>
      <button type="button" [attr.aria-label]="'feed.drawer.close' | translate" (click)="closed.emit()">x</button>
    </header>

    <p class="alert-update-drawer__hint">{{ 'feed.alert.detail.report.reviewHint' | translate }}</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <label>
        <span>{{ 'feed.alert.detail.report.reasonLabel' | translate }}</span>
        <select formControlName="reason" data-og7="alert-update-field" data-og7-id="reason">
          <option value="correction">{{ 'feed.alert.detail.report.reason.correction' | translate }}</option>
          <option value="escalation">{{ 'feed.alert.detail.report.reason.escalation' | translate }}</option>
          <option value="resolved">{{ 'feed.alert.detail.report.reason.resolved' | translate }}</option>
          <option value="newSource">{{ 'feed.alert.detail.report.reason.newSource' | translate }}</option>
        </select>
      </label>

      <label>
        <span>{{ 'feed.alert.detail.report.summaryLabel' | translate }}</span>
        <textarea
          rows="5"
          formControlName="summary"
          [placeholder]="'feed.alert.detail.report.summaryPlaceholder' | translate"
          data-og7="alert-update-field"
          data-og7-id="summary"
        ></textarea>
        <small *ngIf="form.controls.summary.touched && form.controls.summary.hasError('required')">
          {{ 'validation.required' | translate }}
        </small>
        <small *ngIf="form.controls.summary.touched && form.controls.summary.hasError('minlength')">
          {{ 'validation.minLength' | translate:{ min: 10 } }}
        </small>
      </label>

      <label>
        <span>{{ 'feed.alert.detail.report.sourceUrlLabel' | translate }}</span>
        <input
          type="url"
          formControlName="sourceUrl"
          [placeholder]="'feed.alert.detail.report.sourceUrlPlaceholder' | translate"
          data-og7="alert-update-field"
          data-og7-id="source-url"
        />
        <small *ngIf="form.controls.sourceUrl.touched && form.controls.sourceUrl.hasError('pattern')">
          {{ 'validation.url' | translate }}
        </small>
      </label>

      <p
        class="alert-update-drawer__status alert-update-drawer__status--success"
        *ngIf="submitState() === 'success'"
        data-og7="alert-update-status"
        data-og7-id="success"
      >
        {{ 'feed.alert.detail.report.status.success' | translate }}
      </p>
      <p
        class="alert-update-drawer__status alert-update-drawer__status--error"
        *ngIf="submitState() === 'error'"
        data-og7="alert-update-status"
        data-og7-id="error"
      >
        {{ submitError() || ('feed.alert.detail.report.status.errorGeneric' | translate) }}
      </p>

      <div class="alert-update-drawer__actions">
        <button type="submit" [disabled]="submitting()" data-og7="action" data-og7-id="alert-update-submit">
          {{ 'feed.alert.detail.report.submit' | translate }}
        </button>
      </div>
    </form>
  </section>
</div>

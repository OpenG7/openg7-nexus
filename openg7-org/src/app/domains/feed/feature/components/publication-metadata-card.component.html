<article *ngIf="metadata() && (publicationConfig() || rows().length)" class="publication-metadata" data-og7="publication-metadata-card">
  <header class="publication-metadata__header">
    <div>
      <h2>{{ 'feed.publicationMetadata.title' | translate }}</h2>
      <p *ngIf="publicationConfig() as config">{{ config.titleKey | translate }}</p>
      <p *ngIf="!publicationConfig() && metadata()?.publicationForm?.formKey as formKey">{{ formKey }}</p>
    </div>
    <small *ngIf="resolveSchemaVersion() as schemaVersion">
      {{ 'feed.publicationMetadata.schemaVersion' | translate:{ value: schemaVersion } }}
    </small>
  </header>

  <p *ngIf="publicationConfig()?.descriptionKey as descriptionKey" class="publication-metadata__description">
    {{ descriptionKey | translate }}
  </p>

  <ul *ngIf="rows().length" class="publication-metadata__list">
    <li *ngFor="let row of rows()">
      <span>{{ row.label | translate }}</span>
      <strong>{{ row.value | translate }}</strong>
    </li>
  </ul>
</article>
